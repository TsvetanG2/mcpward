name: Integration

# Runs mcpward against REAL, version-pinned reference MCP servers.
# Fixture tests prove our checks behave correctly against known ground truth;
# this suite catches gaps between our model of the protocol and reality.
# Pinned versions keep it deterministic — bump them deliberately.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  real-servers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - name: filesystem
            pkg: '@modelcontextprotocol/server-filesystem@2026.7.10'
            args: '/tmp/mcpward-sandbox'
          - name: memory
            pkg: '@modelcontextprotocol/server-memory@2026.7.4'
            args: ''
          - name: everything
            pkg: '@modelcontextprotocol/server-everything@2026.7.4'
            args: ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Prepare sandbox
        run: mkdir -p /tmp/mcpward-sandbox && echo "hello" > /tmp/mcpward-sandbox/hello.txt

      - name: Generate config for ${{ matrix.server.name }}
        run: |
          cat > integration.yaml <<'YAML'
          server:
            transport: stdio
            command: npx
            args: ["-y", "${{ matrix.server.pkg }}"${{ matrix.server.args && format(', "{0}"', matrix.server.args) || '' }}]
          checks:
            compliance: true
            schema: true
            security: true
          YAML
          cat integration.yaml

      - name: Run mcpward
        run: node dist/cli.js run --config integration.yaml --reporter json --out result-${{ matrix.server.name }}.json

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.server.name }}
          path: result-${{ matrix.server.name }}.json
