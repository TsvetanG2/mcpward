name: Bug report
description: mcpward behaved incorrectly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Security issues do not belong here.** If mcpward reported a genuinely poisoned or drifted server as clean (a false negative), or you found a way to exploit the harness itself, please follow [SECURITY.md](../blob/main/SECURITY.md) and report privately.

  - type: dropdown
    id: kind
    attributes:
      label: What kind of bug?
      options:
        - False positive (flagged something that is actually fine)
        - False negative (missed something it should have caught)
        - Crash or error
        - Wrong report output (JSON/JUnit/SARIF/console)
        - Wrong exit code
        - Config parsing problem
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mcpward version
      placeholder: 'e.g. 0.1.0 (or `npx mcpward --version`)'
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Node version and OS
      placeholder: 'e.g. Node 22.11 on macOS 15'
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options: [stdio, http, both, not applicable]
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Paste the relevant output. `--verbose` output is especially useful.
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Your mcpward.yaml
      description: Redact any secrets or tokens.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        The most useful reproduction is a minimal MCP server that triggers the behavior — that becomes a fixture and a regression test. Second best: which public server, pinned to a version.
    validations:
      required: true
