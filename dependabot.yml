version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: ['minor', 'patch']
      production-patch:
        dependency-type: production
        update-types: ['patch']
    ignore:
      # The MCP SDK is the protocol backbone — review majors by hand.
      - dependency-name: '@modelcontextprotocol/sdk'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore'
