name: 'mcpward'
description: 'Black-box security & contract testing for MCP servers'
author: 'TsvetanG2'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  config:
    description: 'Path to mcpward.yaml config file'
    required: false
    default: 'mcpward.yaml'
  reporter:
    description: 'Output format: console, json, junit, sarif'
    required: false
    default: 'console'
  output:
    description: 'Path to write report file (for json/junit/sarif reporters)'
    required: false
  version:
    description: 'mcpward version to use (ignored if local is true)'
    required: false
    default: '0.1.0'
  local:
    description: 'Use local build (node dist/cli.js) instead of npx. For testing in mcpward repo.'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory for running mcpward'
    required: false
    default: '.'

outputs:
  exit-code:
    description: 'Exit code from mcpward (0=pass, 1=fail, 2=error)'
    value: ${{ steps.run.outputs.exit-code }}
  report-path:
    description: 'Path to the generated report file (if output was specified)'
    value: ${{ steps.run.outputs.report-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run mcpward
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IN_CONFIG: ${{ inputs.config }}
        IN_VERSION: ${{ inputs.version }}
        IN_REPORTER: ${{ inputs.reporter }}
        IN_OUTPUT: ${{ inputs.output }}
        IN_LOCAL: ${{ inputs.local }}
      run: |
        set -uo pipefail

        # Build command args as array (safe from injection)
        args=(run --config "$IN_CONFIG")

        if [ "$IN_REPORTER" != "console" ]; then
          args+=(--reporter "$IN_REPORTER")
        fi

        if [ -n "$IN_OUTPUT" ]; then
          args+=(--out "$IN_OUTPUT")
          printf 'report-path=%s\n' "$IN_OUTPUT" >> "$GITHUB_OUTPUT"
        fi

        # Run mcpward and capture exit code
        # We disable errexit temporarily to capture the exit code
        set +e
        if [ "$IN_LOCAL" = "true" ]; then
          node dist/cli.js "${args[@]}"
        else
          npx "mcpward@$IN_VERSION" "${args[@]}"
        fi
        EXIT_CODE=$?
        set -e

        printf 'exit-code=%s\n' "$EXIT_CODE" >> "$GITHUB_OUTPUT"

        # Fail the step with appropriate error message
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::mcpward checks failed"
          exit 1
        elif [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::mcpward configuration or connection error"
          exit 2
        fi
