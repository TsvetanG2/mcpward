name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  # Dogfood: run mcpward against our own fixtures
  dogfood:
    name: Dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run mcpward against good-server (JUnit)
        run: |
          cat > test-dogfood.yaml << 'EOF'
          server:
            transport: stdio
            command: npx
            args: ['tsx', './fixtures/good-server/index.ts']
          checks:
            compliance: true
            schema: true
            security: true
          EOF
          node dist/cli.js run --config test-dogfood.yaml --reporter junit --out mcpward-results.xml

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcpward-dogfood-results
          path: mcpward-results.xml

